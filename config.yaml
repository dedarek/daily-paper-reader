  owner: ''
  repo: daily-paper-reader
arxiv_paper_setting:
  mode: standard
  days_window: 9
  docs_dir: docs
  prefer_supabase_read: true
supabase:
  enabled: true
  url: https://lyucdwgefyfbmaiopjbk.supabase.co
  anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
  papers_table: arxiv_papers
  use_vector_rpc: true
  vector_rpc: match_arxiv_papers
  vector_rpc_ann: match_arxiv_papers
  vector_rpc_exact: match_arxiv_papers_exact
  use_bm25_rpc: true
  bm25_rpc: match_arxiv_papers_bm25
  sync_table: arxiv_sync_status
  sync_success_value: success
  schema: public
subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
  - tag: small-model-content-safety
    description: >-
      聚焦用小模型和轻量方法完成LLM输入输出内容安全管理与审核，包括moderation classifier、
      guard model、安全分类器、蒸馏、量化、模型压缩、级联审核、低延迟和端侧部署。
      优先收录提出可部署防护方法并报告参数量、延迟、吞吐、成本或资源开销的论文；
      排除仅研究攻击、越狱、漏洞披露、红队评测、benchmark、水印、泛智能体安全和无审核方法的综述。
    enabled: true
    paper_sources:
    - arxiv
    keywords:
    - keyword: lightweight content moderation model
      keyword_cn: 轻量内容审核模型
      query: lightweight small language model for content moderation and harmful content classification
    - keyword: compact LLM guard model
      keyword_cn: 紧凑型LLM安全护栏模型
      query: compact efficient guard model for LLM input and output safety classification
    - keyword: small safety classifier
      keyword_cn: 小型安全分类器
      query: small parameter-efficient safety classifier for large language model prompts and responses
    - keyword: distilled moderation model
      keyword_cn: 蒸馏内容审核模型
      query: knowledge distillation from large language models into small content moderation safety models
    - keyword: quantized safety classifier
      keyword_cn: 量化安全分类器
      query: quantized low-bit safety classifier or guard model for LLM content moderation
    - keyword: cascaded content moderation
      keyword_cn: 级联内容审核
      query: cascaded content moderation using small models with escalation to large language models
    - keyword: low latency LLM guardrail
      keyword_cn: 低延迟LLM安全护栏
      query: low latency low cost guardrail model for real-time LLM content safety
    - keyword: on-device content safety model
      keyword_cn: 端侧内容安全模型
      query: on-device edge deployable small model for harmful content detection and LLM safety
    - keyword: training-free lightweight guardrail
      keyword_cn: 免训练轻量安全护栏
      query: training-free lightweight guardrail for detecting unsafe LLM prompts and responses
    intent_queries:
    - query: Find methods that use small or compact models to moderate unsafe LLM inputs and outputs, with measured accuracy and deployment cost
      query_cn: 查找使用小型或紧凑模型审核不安全LLM输入输出且报告准确率与部署成本的方法
      enabled: true
      source: manual
      note: Prioritize deployable moderation methods; exclude attack-only and benchmark-only papers.
    - query: Find distilled, quantized, pruned, or parameter-efficient safety classifiers and guard models for harmful content detection
      query_cn: 查找用于有害内容检测的蒸馏、量化、剪枝或参数高效安全分类器和护栏模型
      enabled: true
      source: manual
      note: Require a concrete moderation or safety classification method.
    - query: Find cascaded moderation systems where a small model handles common cases and escalates uncertain cases to a larger model
      query_cn: 查找小模型处理常见情况并将不确定样本升级给大模型的级联审核系统
      enabled: true
      source: manual
      note: Prioritize routing, confidence calibration, latency, throughput, and cost evaluation.
    - query: Find low-latency or on-device LLM content safety guardrails with parameter count, memory, throughput, or hardware measurements
      query_cn: 查找报告参数量、内存、吞吐或硬件指标的低延迟或端侧LLM内容安全护栏
      enabled: true
      source: manual
      note: Exclude generic agent security, watermarking, and surveys without a deployable moderation method.
    - query: Find training-free or retrieval-based lightweight guardrails that classify unsafe prompts and generated responses
      query_cn: 查找对不安全提示和生成回复进行分类的免训练或检索式轻量护栏
      enabled: true
      source: manual
      note: Prefer methods with direct comparisons against neural guard models.
source_backends:
  arxiv:
    papers_table: arxiv_papers
    use_vector_rpc: true
    vector_rpc: match_arxiv_papers_exact
    vector_rpc_exact: match_arxiv_papers_exact
    use_bm25_rpc: true
    bm25_rpc: match_arxiv_papers_bm25
    sync_table: arxiv_sync_status
    sync_success_value: success
    schema: public
    kind: supabase
    enabled: true
    url: https://lyucdwgefyfbmaiopjbk.supabase.co
    anon_key: sb_publishable_lX-oi64Uxyd7SIVv3_w2Uw_MTOojeKq
