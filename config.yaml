  - tag: smcs
    description: 聚焦用小模型和轻量方法完成LLM输入输出内容安全管理与审核，核心目标必须是有害内容、毒性、仇恨/攻击性语言、危险提示、越狱/提示注入识别，或安全护栏/安全路由。包括moderation classifier、guard model、安全分类器、蒸馏、量化、模型压缩、级联审核、低延迟和端侧部署。优先收录提出可部署防护方法并报告参数量、延迟、吞吐、成本或资源开销的论文；排除泛RAG、通用文档/立场分类、通用参数高效微调、通用边云推理、CVE/汽车映射、泛智能体安全、仅研究攻击/越狱/漏洞披露/红队评测、benchmark、水印和无审核方法的综述。
